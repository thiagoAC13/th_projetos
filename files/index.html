<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Pedidos - Clínica Odontológica</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #2d3748;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      color: #718096;
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .link-card {
      display: block;
      padding: 30px;
      border-radius: 16px;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .tablet-link {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .painel-link {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .link-card h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .link-card span {
      font-size: 1rem;
      opacity: 0.9;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 30px;
      }

      h1 {
        font-size: 2rem;
      }

      .link-card h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦷 Sistema de Pedidos</h1>
    <p>Escolha a interface apropriada para começar</p>
    
    <div class="links">
      <a href="/tablet" class="link-card tablet-link">
        <div class="icon">📱</div>
        <h2>Interface do Tablet</h2>
        <span>Para clientes na sala de espera</span>
      </a>
      
      <a href="/painel" class="link-card painel-link">
        <div class="icon">💻</div>
        <h2>Painel Administrativo</h2>
        <span>Para receber e gerenciar pedidos</span>
      </a>
    </div>
  </div>
</body>
</html>
