<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Clube de Desbravadores</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="galeria.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <path d="M20 5L35 15V25L20 35L5 25V15L20 5Z" fill="#1e40af" stroke="#dc2626" stroke-width="2"/>
                    <path d="M20 15L25 20L20 25L15 20L20 15Z" fill="#dc2626"/>
                </svg>
                <span class="logo-text">Desbravadores</span>
            </div>
            <a href="index.html" class="btn-secondary">← Voltar</a>
        </div>
    </header>

    <main class="gallery-page">
        <div class="container">
            <h1>Galeria de Momentos</h1>
            <p class="page-subtitle">Reviva os melhores momentos do nosso clube</p>

            <div class="gallery-full">
                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Acampamento">
                    <div class="gallery-caption">Acampamento de Verão 2024</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Trilha">
                    <div class="gallery-caption">Trilha na Serra da Mantiqueira</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Atividades">
                    <div class="gallery-caption">Atividades em Equipe</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Serviço">
                    <div class="gallery-caption">Dia de Serviço Comunitário</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Fogueira">
                    <div class="gallery-caption">Noite de Fogueira</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Escalada">
                    <div class="gallery-caption">Workshop de Escalada</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Primeiros Socorros">
                    <div class="gallery-caption">Treinamento de Primeiros Socorros</div>
                </div>

                <div class="gallery-item-full">
                    <img src="/placeholder.svg?height=400&width=600" alt="Caiaque">
                    <div class="gallery-caption">Aventura Aquática</div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
