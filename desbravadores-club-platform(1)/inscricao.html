<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Clube de Desbravadores</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="inscricao.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <path d="M20 5L35 15V25L20 35L5 25V15L20 5Z" fill="#1e40af" stroke="#dc2626" stroke-width="2"/>
                    <path d="M20 15L25 20L20 25L15 20L20 15Z" fill="#dc2626"/>
                </svg>
                <span class="logo-text">Desbravadores</span>
            </div>
            <a href="index.html" class="btn-secondary">← Voltar</a>
        </div>
    </header>

    <main class="signup-page">
        <div class="container">
            <div class="signup-container">
                <h1>Junte-se aos Desbravadores</h1>
                <p class="subtitle">Comece sua jornada de aventura e crescimento</p>

                <button class="btn-google" onclick="signupWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg>
                    Continuar com Google
                </button>

                <div class="divider">
                    <span>ou preencha o formulário</span>
                </div>

                <form class="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">Nome *</label>
                            <input type="text" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Sobrenome *</label>
                            <input type="text" id="lastName" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefone *</label>
                        <input type="tel" id="phone" placeholder="(11) 12345-6789" required>
                    </div>

                    <div class="form-group">
                        <label for="birthdate">Data de Nascimento *</label>
                        <input type="date" id="birthdate" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha *</label>
                        <input type="password" id="password" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Senha *</label>
                        <input type="password" id="confirmPassword" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" required>
                            Eu aceito os termos de uso e política de privacidade
                        </label>
                    </div>

                    <button type="submit" class="btn-primary-full">Criar Conta</button>
                </form>

                <p class="form-footer">
                    Já tem uma conta? <a href="#" onclick="openLoginModal()">Entre aqui</a>
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="inscricao.js"></script>
</body>
</html>
