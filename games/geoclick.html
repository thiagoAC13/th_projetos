<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 FlagMatch — Jogo de Bandeiras</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #f0c040;
    --accent2: #40c0f0;
    --success: #40f0a0;
    --error: #f05060;
    --text: #e8e8f0;
    --text-dim: #888899;
    --radius: 12px;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,192,64,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(64,192,240,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 2rem;
  }

  .intro-logo {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    text-align: center;
  }

  .intro-logo span {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, #f08040 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-logo small {
    display: block;
    font-size: 0.22em;
    font-family: var(--font-mono);
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    -webkit-text-fill-color: var(--text-dim);
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  .intro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .input-group label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .input-group input {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    padding: 0.85rem 1.2rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: var(--text-dim); font-weight: 400; }

  .input-error {
    font-size: 0.78rem;
    color: var(--error);
    font-family: var(--font-mono);
    display: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-transform: uppercase;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(240,192,64,0.35);
  }

  .btn-primary:active { transform: translateY(0); }

  .ranking-preview {
    margin-top: 0.5rem;
  }

  .ranking-preview h3 {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 1rem;
  }

  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .rank-empty {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    text-align: center;
    padding: 1rem;
  }

  .rank-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    border: 1px solid var(--border);
  }

  .rank-pos {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 700;
    width: 1.5rem;
    text-align: center;
    color: var(--text-dim);
  }

  .rank-pos.gold { color: #f0c040; }
  .rank-pos.silver { color: #b0b8c8; }
  .rank-pos.bronze { color: #c08050; }

  .rank-name {
    flex: 1;
    font-weight: 700;
    font-size: 0.9rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rank-score {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 700;
  }

  .rank-time {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* ── GAME SCREEN ── */
  #screen-game {
    flex-direction: column;
    min-height: 100vh;
    padding: 1.5rem;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  .game-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .game-title {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hud {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .hud-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.4rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
  }

  .hud-pill .label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .hud-pill .value {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  #timer-display { color: var(--accent2); }
  #score-display { color: var(--accent); }

  .progress-bar-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .game-panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    flex: 1;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .panel-title {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font-mono);
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.65rem;
  }

  /* FLAG CARD */
  .flag-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s ease;
    overflow: hidden;
    aspect-ratio: 3/2;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flag-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .flag-card:hover:not(.matched):not(.incorrect) {
    border-color: var(--accent);
    transform: scale(1.03);
    box-shadow: 0 4px 20px rgba(240,192,64,0.2);
  }

  .flag-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,192,64,0.3);
    transform: scale(1.03);
  }

  .flag-card.matched {
    border-color: var(--success);
    opacity: 0.55;
    cursor: default;
    pointer-events: none;
  }

  .flag-card.matched::after {
    content: '✓';
    position: absolute;
    inset: 0;
    background: rgba(64,240,160,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--success);
  }

  .flag-card.incorrect {
    border-color: var(--error);
    animation: shake 0.35s ease;
  }

  /* COUNTRY CARD */
  .country-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s ease;
    padding: 0.7rem 1rem;
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1.3;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 52px;
    position: relative;
  }

  .country-card:hover:not(.matched):not(.incorrect) {
    border-color: var(--accent2);
    transform: scale(1.02);
    box-shadow: 0 4px 20px rgba(64,192,240,0.2);
    background: var(--surface);
  }

  .country-card.selected {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(64,192,240,0.3);
    background: var(--surface);
    transform: scale(1.02);
  }

  .country-card.matched {
    border-color: var(--success);
    opacity: 0.55;
    cursor: default;
    pointer-events: none;
    color: var(--success);
  }

  .country-card.incorrect {
    border-color: var(--error);
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ── VICTORY SCREEN ── */
  #screen-victory {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 2rem;
    text-align: center;
  }

  .victory-emoji {
    font-size: 5rem;
    animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }

  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .victory-title {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .victory-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem 2rem;
    min-width: 140px;
  }

  .stat-box .stat-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .stat-box .stat-value {
    font-size: 2rem;
    font-weight: 800;
    margin-top: 0.25rem;
  }

  .stat-box.accent .stat-value { color: var(--accent); }
  .stat-box.accent2 .stat-value { color: var(--accent2); }

  .victory-ranking {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    width: 100%;
    max-width: 460px;
  }

  .victory-ranking h3 {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 1.25rem;
  }

  .btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0.9rem 1.8rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-secondary:hover {
    border-color: var(--text);
    background: var(--surface);
  }

  /* ── FEEDBACK TOAST ── */
  .toast {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.7rem 1.5rem;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 700;
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.good { border-color: var(--success); color: var(--success); }
  .toast.bad  { border-color: var(--error);   color: var(--error); }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .game-panels { grid-template-columns: 1fr; }
    .cards-grid  { grid-template-columns: repeat(2, 1fr); }
    .country-card { font-size: 0.78rem; min-height: 44px; }
    .hud { gap: 0.5rem; }
  }

  @media (max-width: 420px) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- ══════ INTRO SCREEN ══════ -->
<div id="screen-intro" class="screen active">
  <div class="intro-logo">
    <span>FlagMatch</span>
    <small>Jogo de Bandeiras do Mundo</small>
  </div>

  <div class="intro-card">
    <div class="input-group">
      <label>Seu nome</label>
      <input type="text" id="player-name" placeholder="Digite seu nome..." maxlength="24" autocomplete="off">
      <span class="input-error" id="name-error">⚠ Por favor, insira seu nome para começar.</span>
    </div>

    <button class="btn-primary" onclick="startGame()">Iniciar Jogo →</button>

    <div class="ranking-preview">
      <h3>🏆 Ranking da Sessão</h3>
      <div class="rank-list" id="intro-rank-list">
        <div class="rank-empty">Nenhum jogo ainda. Seja o primeiro!</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════ GAME SCREEN ══════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-title">🌍 FlagMatch</div>
    <div class="hud">
      <div class="hud-pill">
        <span class="label">Jogador</span>
        <span class="value" id="hud-player">—</span>
      </div>
      <div class="hud-pill">
        <span class="label">Score</span>
        <span class="value" id="score-display">0</span>
      </div>
      <div class="hud-pill">
        <span class="label">Tempo</span>
        <span class="value" id="timer-display">00:00</span>
      </div>
      <button class="btn-secondary" style="padding:0.4rem 0.9rem;font-size:0.78rem;" onclick="confirmRestart()">↺ Reiniciar</button>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <div class="game-panels">
    <div class="panel">
      <div class="panel-title">🚩 Bandeiras</div>
      <div class="cards-grid" id="flags-grid"></div>
    </div>
    <div class="panel">
      <div class="panel-title">🗺 Países</div>
      <div class="cards-grid" id="countries-grid"></div>
    </div>
  </div>
</div>

<!-- ══════ VICTORY SCREEN ══════ -->
<div id="screen-victory" class="screen">
  <div class="victory-emoji">🎉</div>
  <div class="victory-title">Você Zerou!</div>
  <div class="victory-stats">
    <div class="stat-box accent">
      <div class="stat-label">Pontuação</div>
      <div class="stat-value" id="final-score">0</div>
    </div>
    <div class="stat-box accent2">
      <div class="stat-label">Tempo</div>
      <div class="stat-value" id="final-time">00:00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Acertos</div>
      <div class="stat-value" id="final-correct">0/20</div>
    </div>
  </div>

  <div class="victory-ranking">
    <h3>🏆 Ranking da Sessão</h3>
    <div class="rank-list" id="victory-rank-list"></div>
  </div>

  <div class="btn-group">
    <button class="btn-primary" onclick="startGame()">Jogar Novamente →</button>
    <button class="btn-secondary" onclick="goToIntro()">← Menu</button>
  </div>
</div>

<!-- ══════ TOAST ══════ -->
<div class="toast" id="toast"></div>

const COUNTRIES = ALL_COUNTRIES.filter((c, i, arr) =>
  arr.findIndex(x => x.code === c.code) === i
);

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let playerName   = '';
let gameSet      = [];     // 20 randomly chosen countries for this round
let selectedFlag = null;
let selectedCountry = null;
let matchedPairs = 0;
let score        = 0;
let timerInterval = null;
let startTime    = null;
let elapsedSeconds = 0;

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function flagURL(code) {
  return `https://flagcdn.com/w160/${code.toLowerCase()}.png`;
}

function formatTime(seconds) {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  RANKING
// ═══════════════════════════════════════════════════════
function getRanking() {
  try { return JSON.parse(sessionStorage.getItem('flagmatch_ranking') || '[]'); }
  catch { return []; }
}

function saveRanking(entry) {
  const r = getRanking();
  r.push(entry);
  r.sort((a, b) => b.score - a.score || a.seconds - b.seconds);
  sessionStorage.setItem('flagmatch_ranking', JSON.stringify(r.slice(0, 10)));
}

function renderRanking(listId) {
  const r = getRanking();
  const el = document.getElementById(listId);
  if (!r.length) {
    el.innerHTML = '<div class="rank-empty">Nenhum jogo ainda.</div>';
    return;
  }
  const medals = ['gold','silver','bronze'];
  el.innerHTML = r.slice(0, 8).map((e, i) => `
    <div class="rank-item">
      <span class="rank-pos ${medals[i] || ''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</span>
      <span class="rank-name">${e.name}</span>
      <span class="rank-score">${e.score}pts</span>
      <span class="rank-time">${formatTime(e.seconds)}</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer-display').textContent = formatTime(elapsedSeconds);
  }, 500);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ═══════════════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════════════
function startGame() {
  const nameInput = document.getElementById('player-name');
  const nameVal = (nameInput ? nameInput.value : playerName).trim();

  if (!nameVal) {
    const err = document.getElementById('name-error');
    if (err) { err.style.display = 'block'; nameInput.focus(); }
    return;
  }
  playerName = nameVal;

  // Stop any running timer
  stopTimer();
  elapsedSeconds = 0;
  score = 0;
  matchedPairs = 0;
  selectedFlag = null;
  selectedCountry = null;

  // Pick 20 random countries
  gameSet = shuffle(COUNTRIES).slice(0, 20);

  // Update HUD
  document.getElementById('hud-player').textContent = playerName;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('progress-bar').style.width = '0%';

  // Build flag grid (shuffled order)
  const flagsOrder = shuffle(gameSet);
  const flagsGrid = document.getElementById('flags-grid');
  flagsGrid.innerHTML = flagsOrder.map(c => `
    <div class="flag-card" data-code="${c.code}" onclick="selectFlag(this)">
      <img src="${flagURL(c.code)}" alt="${c.name}" loading="lazy">
    </div>
  `).join('');

  // Build country grid (different shuffle)
  const countriesOrder = shuffle(gameSet);
  const countriesGrid = document.getElementById('countries-grid');
  countriesGrid.innerHTML = countriesOrder.map(c => `
    <div class="country-card" data-code="${c.code}" onclick="selectCountry(this)">
      ${c.name}
    </div>
  `).join('');

  showScreen('screen-game');
  startTimer();
}

// ═══════════════════════════════════════════════════════
//  SELECTION LOGIC
// ═══════════════════════════════════════════════════════
function selectFlag(el) {
  if (el.classList.contains('matched')) return;

  // Deselect previous flag selection
  document.querySelectorAll('.flag-card.selected').forEach(e => e.classList.remove('selected'));

  if (selectedFlag === el) {
    // Toggle off
    selectedFlag = null;
    return;
  }

  selectedFlag = el;
  el.classList.add('selected');

  if (selectedCountry) attemptMatch();
}

function selectCountry(el) {
  if (el.classList.contains('matched')) return;

  // Deselect previous country selection
  document.querySelectorAll('.country-card.selected').forEach(e => e.classList.remove('selected'));

  if (selectedCountry === el) {
    selectedCountry = null;
    return;
  }

  selectedCountry = el;
  el.classList.add('selected');

  if (selectedFlag) attemptMatch();
}

function attemptMatch() {
  const flagCode    = selectedFlag.dataset.code;
  const countryCode = selectedCountry.dataset.code;

  if (flagCode === countryCode) {
    // ✅ CORRECT
    selectedFlag.classList.remove('selected');
    selectedCountry.classList.remove('selected');
    selectedFlag.classList.add('matched');
    selectedCountry.classList.add('matched');

    matchedPairs++;
    // Score: base 100 minus time penalty (min 20)
    const pts = Math.max(20, 100 - Math.floor(elapsedSeconds / 2));
    score += pts;

    document.getElementById('score-display').textContent = score;
    document.getElementById('progress-bar').style.width = `${(matchedPairs / 20) * 100}%`;

    const countryName = gameSet.find(c => c.code === flagCode)?.name || '';
    showToast(`✓ ${countryName} — +${pts}pts`, 'good');

    selectedFlag = null;
    selectedCountry = null;

    if (matchedPairs === 20) {
      setTimeout(endGame, 500);
    }

  } else {
    // ❌ INCORRECT
    selectedFlag.classList.add('incorrect');
    selectedCountry.classList.add('incorrect');
    score = Math.max(0, score - 10);
    document.getElementById('score-display').textContent = score;
    showToast('✗ Combinação incorreta! −10pts', 'bad');

    const f = selectedFlag, c = selectedCountry;
    setTimeout(() => {
      f.classList.remove('incorrect', 'selected');
      c.classList.remove('incorrect', 'selected');
    }, 500);

    selectedFlag = null;
    selectedCountry = null;
  }
}

// ═══════════════════════════════════════════════════════
//  END GAME
// ═══════════════════════════════════════════════════════
function endGame() {
  stopTimer();

  saveRanking({ name: playerName, score, seconds: elapsedSeconds });

  document.getElementById('final-score').textContent   = score;
  document.getElementById('final-time').textContent    = formatTime(elapsedSeconds);
  document.getElementById('final-correct').textContent = `${matchedPairs}/20`;

  renderRanking('victory-rank-list');
  showScreen('screen-victory');
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function goToIntro() {
  stopTimer();
  renderRanking('intro-rank-list');
  showScreen('screen-intro');
}

function confirmRestart() {
  if (confirm('Reiniciar o jogo atual?')) {
    startGame();
  }
}

// ── Input: hide error on type ──
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('player-name');
  if (inp) {
    inp.addEventListener('input', () => {
      document.getElementById('name-error').style.display = 'none';
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') startGame();
    });
  }
  renderRanking('intro-rank-list');
});
